<!DOCTYPE html>
<html>

<head>
    <title>AI Voice Therapist</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            margin-bottom: 30px;
        }

        button {
            padding: 18px 40px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        #status {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>AI Voice Therapist</h1>

    <button id="recordBtn">
        Start Recording
    </button>

    <p id="status">
        Click the button and speak.
    </p>

    <script>

        let mediaRecorder;
        let audioChunks = [];

        const button = document.getElementById("recordBtn");
        const status = document.getElementById("status");

        button.onclick = async () => {

            try {

                status.innerText = "Requesting microphone permission...";

                // Ask for microphone access
                const stream =
                    await navigator.mediaDevices.getUserMedia({
                        audio: true
                    });

                // Create media recorder
                mediaRecorder = new MediaRecorder(stream);

                audioChunks = [];

                // Store audio chunks
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                // When recording stops
                mediaRecorder.onstop = async () => {

                    status.innerText = "Sending audio to AI...";

                    // Create audio blob
                    const audioBlob = new Blob(
                        audioChunks,
                        { type: "audio/wav" }
                    );

                    // Create form data
                    const formData = new FormData();

                    formData.append(
                        "audio",
                        audioBlob,
                        "recording.wav"
                    );

                    // Send to backend
                    const response = await fetch(
                        "http://127.0.0.1:8000/voice",
                        {
                            method: "POST",
                            body: formData
                        }
                    );

                    status.innerText = "AI is speaking...";

                    // Receive AI voice
                    const audioResponse =
                        await response.blob();

                    // Create playable URL
                    const audioUrl =
                        URL.createObjectURL(audioResponse);

                    // Play AI voice
                    const audio =
                        new Audio(audioUrl);

                    audio.play();

                    audio.onended = () => {
                        status.innerText = "Conversation complete.";
                    };
                };

                // Start recording
                mediaRecorder.start();

                button.innerText = "Recording...";

                status.innerText =
                    "Recording for 5 seconds...";

                // Stop after 5 seconds
                setTimeout(() => {

                    mediaRecorder.stop();

                    button.innerText =
                        "Start Recording";

                }, 5000);

            } catch (error) {

                console.error(error);

                status.innerText =
                    "Microphone access denied or error occurred.";
            }
        };

    </script>

</body>

</html>
